<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grace Covenant Church Sydney</title>
  <meta name="description"
    content="Grace Covenant Church Sydney - A place to belong, believe, and become. Join us for worship, fellowship, and spiritual growth." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap"
    rel="stylesheet">
  <style>
    @keyframes fade-in-down {
      0% {
        opacity: 0;
        transform: translateY(-30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in-up {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slide-in-right {
      0% {
        opacity: 0;
        transform: translateX(30px);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes gentle-float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-fade-in-down {
      animation: fade-in-down 1s ease-out;
    }

    .animate-fade-in-up {
      animation: fade-in-up 1s ease-out 0.3s both;
    }

    .animate-slide-in-right {
      animation: slide-in-right 0.8s ease-out;
    }

    .animate-gentle-float {
      animation: gentle-float 3s ease-in-out infinite;
    }

    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Inter', 'sans-serif'],
            'serif': ['Playfair Display', 'serif'],
          },
          colors: {
            'brand-blue': '#1a365d',
            'brand-dark-blue': '#0a1929',
            'brand-gold': '#d4af37',
            'brand-cream': '#fdfbf7',
            'brand-gray': '#e5e7eb',
            'brand-teal': '#0d9488',
            'brand-navy': '#1e3a5f',
          },
          backgroundImage: {
            'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            'gradient-hero': 'linear-gradient(135deg, rgba(10, 25, 41, 0.95) 0%, rgba(26, 54, 93, 0.85) 50%, rgba(30, 58, 95, 0.90) 100%)',
          },
          boxShadow: {
            'soft': '0 2px 15px rgba(0, 0, 0, 0.08)',
            'glow': '0 0 30px rgba(212, 175, 55, 0.2)',
          },
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
